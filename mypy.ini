[mypy]
python_version = 3.10
disallow_untyped_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_unused_ignores = True
exclude = tests/

[mypy-yfinance.*]
ignore_missing_imports = True

[mypy-seaborn.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-config_local]
ignore_missing_imports = True

[mypy-playwright.*]
ignore_missing_imports = True
